<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Admin</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header>
    <nav aria-label="Application navigation">
      <a href="/app/index.html">Home</a>
      <a href="/app/requests.html">Requests</a>
      <a href="/app/admin.html" aria-current="page">Admin</a>
    </nav>
  </header>

  <main class="container" id="adminPage">
    <section class="hero">
      <h1>Admin</h1>
      <p>Administrative view: review requests, update status, and add internal notes.</p>
    </section>

    <section class="card" id="adminLoginCard">
      <h2 class="section-title">Admin access</h2>
      <p class="small">Enter the demo admin password to continue.</p>

      <form id="adminLoginForm" novalidate>
        <label>
          Password
          <input id="adminPasswordInput" type="password" />
        </label>

        <div class="actions">
          <button type="submit">Enter admin</button>
          <span id="adminLoginStatus" class="status" role="status" aria-live="polite"></span>
        </div>
      </form>
    </section>

    <section class="card" id="adminPanel" hidden>
      <div class="actions" style="justify-content: space-between;">
        <h2 class="section-title" style="margin: 0;">Request queue</h2>
        <div style="display:flex; gap:0.75rem; flex-wrap:wrap;">
          <button type="button" id="refreshAdminBtn">Refresh</button>
          <button type="button" id="logoutAdminBtn">Log out</button>
        </div>
      </div>

      <div class="table-wrap">
        <table aria-label="Admin requests table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Item</th>
              <th>Status</th>
              <th>Update</th>
              <th>Notes</th>
            </tr>
          </thead>
          <tbody id="adminTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
