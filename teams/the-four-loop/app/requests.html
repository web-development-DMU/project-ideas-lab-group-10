<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Request Detail</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">SourceFlow</div>
      <nav class="topnav" aria-label="Application navigation">
        <a href="/app/index.html">Dashboard</a>
        <a href="/app/requests.html">Requests</a>
        <a href="/app/admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="hero-panel detail-hero">
      <div>
        <p class="eyebrow">Request Detail</p>
        <h1 id="detailTitle">Request</h1>
        <p class="intro">Detailed view of one request, including notes and status updates.</p>
      </div>
      <a class="button-link secondary" href="/app/requests.html">Back to Requests</a>
    </section>

    <section class="detail-grid">
      <article class="panel">
        <div class="panel-header">
          <h2>Request Overview</h2>
          <span id="detailStatusBadge" class="status-pill">New</span>
        </div>

        <div class="detail-list" id="detailMeta"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <h2>Status Timeline</h2>
        </div>
        <div id="timelineList" class="timeline-list"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <h2>Customer</h2>
        </div>
        <div id="customerBlock" class="detail-list"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <h2>Notes & Updates</h2>
        </div>

        <form id="noteForm">
          <label>
            Add note
            <textarea id="noteText" placeholder="Add an update..."></textarea>
          </label>
          <div class="actions">
            <button type="submit">Add Note</button>
            <span id="noteStatus" class="status" role="status" aria-live="polite"></span>
          </div>
        </form>

        <div id="notesList" class="list-stack"></div>
      </article>

      <article class="panel panel-wide">
        <div class="panel-header">
          <h2>Update Status</h2>
        </div>

        <div class="status-actions">
          <select id="detailStatusSelect">
            <option>New</option>
            <option>In Progress</option>
            <option>Sourced</option>
            <option>Completed</option>
          </select>
          <button id="saveDetailStatusBtn" type="button">Save Changes</button>
          <span id="detailStatusMessage" class="status" role="status" aria-live="polite"></span>
        </div>
      </article>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
