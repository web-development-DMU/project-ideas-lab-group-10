<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Admin</title>

  <link rel="stylesheet" href="./team.css" />
  <link rel="stylesheet" href="./app.css" />
</head>

<body>
  <header>
    <nav aria-label="Team navigation">
      <a href="/teams/index.html">← Back to Teams</a>
      <a href="/teams/the-four-loop/index.html">Team Home</a>
      <a href="/requests.html">Requests</a>
      <a aria-current="page" href="/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <h1>Admin</h1>
    <p>Review incoming requests and update status.</p>

    <section class="card">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <h2 style="margin:0;">Queue</h2>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>

      <div class="tableWrap" style="margin-top:12px;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Item</th>
              <th>Brand</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById("rows");
    const STATUSES = ["New", "In Progress", "Sourced", "Completed"];

    async function load() {
      const res = await fetch("/api/requests");
      const data = await res.json();

      rowsEl.innerHTML = "";
      for (const r of data) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.request_id}</td>
          <td>${escapeHtml(r.item_name)}</td>
          <td>${escapeHtml(r.brand ?? "")}</td>
          <td>${escapeHtml(r.status_name)}</td>
          <td>
            <select data-id="${r.request_id}">
              ${STATUSES.map(s => `<option ${s===r.status_name?"selected":""}>${s}</option>`).join("")}
            </select>
            <button data-save="${r.request_id}" type="button">Save</button>
          </td>
        `;
        rowsEl.appendChild(tr);
      }

      rowsEl.querySelectorAll("button[data-save]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.getAttribute("data-save");
          const sel = rowsEl.querySelector(\`select[data-id="\${id}"]\`);
          const status_name = sel.value;

          await fetch(\`/api/requests/\${id}/status\`, {
            method: "PATCH",
            headers: { "content-type": "application/json" },
            body: JSON.stringify({ status_name }),
          });

          load();
        });
      });
    }

    document.getElementById("refreshBtn").addEventListener("click", load);

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    load();
  </script>
</body>
</html>
