<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Requests</title>

  <link rel="stylesheet" href="../style-example.css" />
  <link rel="stylesheet" href="./team.css" />

  <style>
    .container{ max-width: 1100px; margin: 0 auto; padding: 18px; }
    .toolbar{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between; margin: 14px 0; }
    .card{ background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 14px; }
    .row{ display:flex; gap:10px; flex-wrap:wrap; }
    input, select, button{
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.92);
      padding: 10px 12px;
    }
    button{ cursor:pointer; font-weight: 800; }
    button.primary{ background: #fff; color:#0b0f19; }
    table{ width:100%; border-collapse: collapse; overflow:hidden; border-radius: 14px; }
    th, td{ padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.10); vertical-align: top; }
    th{ text-align:left; color: rgba(255,255,255,0.78); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
    .muted{ color: rgba(255,255,255,0.70); }
    .pill{ display:inline-block; padding: 6px 10px; border-radius: 999px; border:1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.07); font-weight: 800; font-size: 12px; }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }
    .error{ color:#ffb3b3; font-weight:800; }
    .success{ color:#b6ffcf; font-weight:800; }
  </style>
</head>

<body>
  <header>
    <nav aria-label="Team navigation">
      <a href="/teams/index.html">← Back to Teams</a>
      <a href="./index.html">Team Home</a>
      <a href="./ui.html">UI</a>
      <a href="./db.html">Database</a>
      <a href="./routes.html">Routes</a>
      <a href="./architecture.html">Architecture</a>
      <a href="./requests.html" aria-current="page">Requests</a>
    </nav>
  </header>

  <main class="container">
    <h1>Requests</h1>
    <p class="muted">Create, track, and update personal shopping requests.</p>

    <section class="card" aria-label="Create request">
      <h2>Create a new request</h2>

      <div class="row">
        <label>
          <span class="muted">Item name *</span><br />
          <input id="item_name" required minlength="2" placeholder="e.g., Prada loafers" />
        </label>

        <label>
          <span class="muted">Brand</span><br />
          <input id="brand" placeholder="e.g., Prada" />
        </label>

        <label>
          <span class="muted">Budget (£)</span><br />
          <input id="budget_gbp" type="number" step="0.01" placeholder="e.g., 800" />
        </label>

        <label>
          <span class="muted">Size</span><br />
          <input id="size" placeholder="e.g., UK 7" />
        </label>

        <label>
          <span class="muted">Colour</span><br />
          <input id="colour" placeholder="e.g., Black" />
        </label>

        <button class="primary" id="createBtn">Create</button>
      </div>

      <p id="msg" class="muted" role="status" aria-live="polite"></p>
    </section>

    <div class="toolbar">
      <h2 style="margin:0;">All requests</h2>
      <button id="refreshBtn">Refresh</button>
    </div>

    <section class="card" aria-label="Requests table">
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Item</th>
              <th>Brand</th>
              <th>Budget</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
