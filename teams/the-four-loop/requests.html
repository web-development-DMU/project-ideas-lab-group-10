<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SourceFlow — Requests</title>

  <link rel="stylesheet" href="./team.css" />
  <link rel="stylesheet" href="./app.css" />
</head>

<body>
  <header>
    <nav aria-label="Team navigation">
      <a href="/teams/index.html">← Back to Teams</a>
      <a href="/teams/the-four-loop/index.html">Team Home</a>
      <a href="/teams/the-four-loop/ui.html">UI</a>
      <a href="/teams/the-four-loop/db.html">Database</a>
      <a href="/teams/the-four-loop/routes.html">Routes</a>
      <a href="/teams/the-four-loop/architecture.html">Architecture</a>
      <a aria-current="page" href="/requests.html">Requests</a>
      <a href="/admin.html">Admin</a>
    </nav>
  </header>

  <main class="container">
    <h1>Requests</h1>
    <p>Create, track, and update personal shopping requests.</p>

    <section class="card">
      <h2>Create a new request</h2>

      <form id="createForm">
        <div class="grid">
          <label>
            Item name <span aria-hidden="true">*</span>
            <input name="item_name" required />
          </label>

          <label>
            Brand
            <input name="brand" />
          </label>

          <label>
            Budget (£)
            <input name="budget_gbp" type="number" step="0.01" min="0" />
          </label>

          <label>
            Size
            <input name="size" />
          </label>

          <label>
            Colour
            <input name="colour" />
          </label>
        </div>

        <button type="submit">Create</button>
        <span id="msg" role="status" style="margin-left:12px;"></span>
      </form>
    </section>

    <section class="card" style="margin-top:18px;">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <h2 style="margin:0;">All requests</h2>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>

      <div class="tableWrap" style="margin-top:12px;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Item</th>
              <th>Brand</th>
              <th>Budget</th>
              <th>Status</th>
              <th>Created</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const rowsEl = document.getElementById("rows");
    const msgEl = document.getElementById("msg");

    async function loadRequests() {
      const res = await fetch("/api/requests");
      const data = await res.json();

      rowsEl.innerHTML = "";
      for (const r of data) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.request_id}</td>
          <td>${escapeHtml(r.item_name)}</td>
          <td>${escapeHtml(r.brand ?? "")}</td>
          <td>${r.budget_gbp ?? ""}</td>
          <td>${escapeHtml(r.status_name)}</td>
          <td>${new Date(r.created_at).toLocaleString()}</td>
        `;
        rowsEl.appendChild(tr);
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadRequests);

    document.getElementById("createForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      msgEl.textContent = "Creating...";

      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());

      const res = await fetch("/api/requests", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify(payload),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        msgEl.textContent = err.error || "Failed to create";
        return;
      }

      e.target.reset();
      msgEl.textContent = "✅ Created";
      await loadRequests();
    });

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[c]));
    }

    loadRequests();
  </script>
</body>
</html>
